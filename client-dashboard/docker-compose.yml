volumes:
  datafiles:

services:
  client-dashboard:
    container_name: client-dashboard
    build:
      context: ./client-dashboard
      dockerfile: Dockerfile
    volumes:
      - "./client-dashboard:/app"
      - "/app/node_modules"
    ports:
      - "8080:8080"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - NODE_ENV=development
    depends_on:
      - api #Adding Dependency For API due to issues with dotnet build due to personal pc build tool issues. I keep it here because it makes sense for a test application to have all parts functioning

  database:
    image: mysql:8.0.22
    ports:
      - "3306:3306"
    volumes:
      - datafiles:/var/lib/mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Root0++
      MYSQL_USER: newuser
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: ClientDashboardDB

  api:
    build:
      context: ./ClientDashboardAPI
      dockerfile: Dockerfile
    depends_on:
      - database
    ports:
      - "5000:5000"
    restart: always
    environment:
      - DBHOST=database
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Development
